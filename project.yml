name: ThalesAssessment

options:
  bundleIdPrefix: com.thenarciss
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  ThalesAssessment:
    type: application
    platform: iOS
    sources:
      - path: ThalesAssessment
    info:
      path: ThalesAssessment/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thenarciss.thales
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: ""

  ThalesAssessmentTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ThalesAssessmentTests
    dependencies:
      - target: ThalesAssessment
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thenarciss.thales.tests
        GENERATE_INFOPLIST_FILE: YES
